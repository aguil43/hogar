<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <link rel="stylesheet" href="static/style.css">
    <link rel="shortcut icon" href="/static/img/logo.png" type="image/x-icon">
</head>
<body link="white" vlink="white">
    <div class="cuadro">
        <header class="titulo">
            <h1>Log In</h1>
        </header>
        <form class="campos" action="/login" method="POST">
            <input type="text" placeholder="Nombre de usuario" id="nombre" name="username">
            <input type="password" placeholder="Contraseña" id="contraseña" name="password">
            <button type="submit">Ingresar</button>
        </form>
    </div>
</body>
<script src="static/app.js"></script>
<script src="static/bibliotecas/node_modules/crypto-js/crypto-js.js"></script>
{% if err %}
<script>
    alert("Error al iniciar sesion");
    window.open('/login', "_self")
</script>
{% endif %}
</html>
